name: Scheduled Release - Mamba Implementation

on:
  schedule:
    # 10:00 AM IST = 04:30 UTC, July 18 2026
    - cron: '30 4 18 7 *'
  workflow_dispatch:  # allow manual trigger for testing

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up git identity
        run: |
          git config user.name "eeshsaxena"
          git config user.email "eeshsaxena@users.noreply.github.com"

      - name: Stage and commit Mamba implementation
        run: |
          git add mamba/
          git add README.md
          git commit -m "add mamba selective ssm implementation from arXiv:2312.00752"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push commit
        run: git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Open Issue 1 - Flash Attention
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Implement Flash Attention (arXiv:2205.14135)',
              labels: ['enhancement', 'paper'],
              body: `## Flash Attention: Fast and Memory-Efficient Exact Attention with IO-Awareness

**Paper:** https://arxiv.org/abs/2205.14135
**Authors:** Tri Dao, Dan Fu, Stefano Ermon, Atri Rudra, Christopher Re (2022)

### What to implement

- [ ] Standard scaled dot-product attention baseline
- [ ] Tiled attention with online softmax (Algorithm 1)
- [ ] Backward pass with recomputation
- [ ] Benchmarks vs naive attention on sequence length 512, 1024, 2048

### Key insight

Standard attention materialises the full N×N attention matrix in HBM (slow memory).
Flash Attention tiles the computation to stay in SRAM (fast memory), reducing
memory from O(N²) to O(N) without approximation.

### Notes

Reference PyTorch implementation first, then optionally a Triton kernel version.
`torch.nn.functional.scaled_dot_product_attention` can be used as the ground truth.`
            })

      - name: Open Issue 2 - LoRA
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Implement LoRA: Low-Rank Adaptation of LLMs (arXiv:2106.09685)',
              labels: ['enhancement', 'paper'],
              body: `## LoRA: Low-Rank Adaptation of Large Language Models

**Paper:** https://arxiv.org/abs/2106.09685
**Authors:** Edward Hu et al. (2021)

### What to implement

- [ ] \`LoRALinear\` layer — wraps \`nn.Linear\` with frozen weights + low-rank delta
- [ ] \`LoRAConfig\` with rank r, alpha, target modules
- [ ] \`apply_lora(model, config)\` utility to patch any transformer
- [ ] Merge/unmerge weights for zero-overhead inference
- [ ] Demo: fine-tune a tiny GPT on Shakespeare with and without LoRA, compare parameter counts

### Key insight

Instead of updating W (d×k), LoRA trains two small matrices A (d×r) and B (r×k)
where r << min(d,k). The adapted weight is W + alpha/r * B @ A.
This reduces trainable parameters by 10000x on large models.

### Acceptance criteria

Parameter reduction ratio printed, loss curves comparable to full fine-tune.`
            })

      - name: Open Issue 3 - DPO
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Implement DPO: Direct Preference Optimization (arXiv:2305.18290)',
              labels: ['enhancement', 'paper'],
              body: `## Direct Preference Optimization: Your Language Model is Secretly a Reward Model

**Paper:** https://arxiv.org/abs/2305.18290
**Authors:** Rafael Rafailov et al. (2023)

### What to implement

- [ ] DPO loss function (Eq. 7 in paper)
- [ ] Reference policy (frozen copy of base model)
- [ ] Preference dataset loader (chosen/rejected pairs)
- [ ] Training loop with beta parameter sweep
- [ ] Comparison with vanilla SFT baseline

### Key insight

RLHF requires training a separate reward model + PPO loop.
DPO shows the optimal policy under RLHF can be expressed in closed form,
reducing alignment to a simple binary cross-entropy loss on preference pairs.

### Loss

\`\`\`
L_DPO = -E[ log sigma( beta * (log pi(y_w|x)/pi_ref(y_w|x) - log pi(y_l|x)/pi_ref(y_l|x)) ) ]
\`\`\`
where y_w = chosen, y_l = rejected response.`
            })

      - name: Open Issue 4 - Diffusion Transformer
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Implement DiT: Scalable Diffusion Models with Transformers (arXiv:2212.09748)',
              labels: ['enhancement', 'paper'],
              body: `## Scalable Diffusion Models with Transformers (DiT)

**Paper:** https://arxiv.org/abs/2212.09748
**Authors:** William Peebles, Saining Xie (2022)

### What to implement

- [ ] Patchify input images into sequence of tokens
- [ ] DiT block with adaLN-Zero conditioning (timestep + class)
- [ ] Final linear layer to decode back to image patches
- [ ] DDPM noise schedule + forward/backward diffusion process
- [ ] Demo on MNIST or CIFAR-10 (small scale)

### Key insight

Replaces U-Net backbone in diffusion models with a standard Vision Transformer.
AdaLN-Zero initialises the final layer to zero so each block starts as identity,
enabling stable training. This is the architecture behind Stable Diffusion 3 and Sora.

### Milestones

1. Diffusion process (noise/denoise)
2. DiT-S/2 architecture (smallest variant)
3. FID score on CIFAR-10 after 100 epochs`
            })

      - name: Open Issue 5 - RWKV
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Implement RWKV: Reinventing RNNs for the Transformer Era (arXiv:2305.13048)',
              labels: ['enhancement', 'paper'],
              body: `## RWKV: Reinventing RNNs for the Transformer Era

**Paper:** https://arxiv.org/abs/2305.13048
**Authors:** Bo Peng et al. (2023)

### What to implement

- [ ] WKV attention mechanism (time-mixing)
- [ ] Channel-mixing block (feed-forward equivalent)
- [ ] RWKV block combining time-mixing + channel-mixing
- [ ] Dual-mode: parallel training mode + recurrent inference mode
- [ ] Verify: same output in both modes on identical input

### Key insight

RWKV achieves transformer-level performance with RNN-style O(1) inference.
The key is the WKV operator — a linear attention variant that can be computed
as a recurrence at inference time but as a parallel scan during training.
No attention matrix is ever formed.

### Why it matters

Pure transformers have O(N²) inference cost. RWKV is O(N) like Mamba
but uses a different formulation without state-space theory.
Comparing these two is scientifically interesting.`
            })

      - name: Open Issue 6 - Benchmarks
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Add unified benchmark: Mamba vs Transformer vs RWKV on sequence modelling',
              labels: ['benchmark', 'good first issue'],
              body: `## Unified Benchmark Suite

Once Mamba, Flash Attention, and RWKV are implemented, run a standardised comparison.

### Metrics

| Model | Params | Train time/step | Inference time (N=1024) | Memory | Perplexity (PTB) |
|---|---|---|---|---|---|
| Transformer (baseline) | - | - | - | - | - |
| Transformer + Flash Attention | - | - | - | - | - |
| Mamba (this repo) | - | - | - | - | - |
| RWKV (this repo) | - | - | - | - | - |

### Setup

- Dataset: Penn Treebank (PTB) character-level
- Sequence lengths: 128, 512, 1024, 4096
- Hardware: single GPU (record model + VRAM)
- Batch size: fixed at 16

### Deliverables

- [ ] \`benchmark/run_all.py\` script
- [ ] Results table in \`benchmark/README.md\`
- [ ] Matplotlib plot: inference time vs sequence length`
            })

      - name: Summary
        run: |
          echo "Done! Committed Mamba implementation and opened 6 issues."
          echo "Check: https://github.com/${{ github.repository }}"
